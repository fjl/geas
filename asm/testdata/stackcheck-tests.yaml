name-mismatch:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [b, a]
      swap1      ; [a, a]
  output:
    bytecode: "6001 6002 90"
    warnings:
      - ':3:0: stack comment item mismatch: item 1 differs (comment "a", actual "b") in [a, b]'

# This checks that a mismatch error on line 3 doesn't produce
# additional warnings on line 4, where the mismatched name is used again.
name-mismatch-no-cascade:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [b, a]
      swap1      ; [a, a]
      pop        ; [a]
  output:
    bytecode: "6001 6002 90 50"
    warnings:
      - ':3:0: stack comment item mismatch: item 1 differs (comment "a", actual "b") in [a, b]'

rename-error:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [b, a]
      swap1      ; [a, renamed]
  output:
    bytecode: "6001 6002 90"
    warnings:
      - ":3:0: stack comment renames item: b renamed to renamed"

# This checks that a rename error on line 3 doesn't produce
# additional warnings on subsequent lines using the renamed item.
rename-no-cascade:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [b, a]
      dup1       ; [b, b, renamed]
      pop        ; [b, renamed]
      pop        ; [renamed]
  output:
    bytecode: "6001 6002 80 50 50"
    warnings:
      - ":3:0: stack comment renames item: a renamed to renamed"

# An item written as "name=expr" defines the item's name to be the left-hand side
# ("offset"); the right-hand side documents the value. Later comments that use the
# short name must not warn.
name-assignment:
  input:
    code: |
      push 5   ; [i]
      push 100 ; [slotbase, i]
      dup2     ; [i, slotbase, i]
      push 32  ; [size, i, slotbase, i]
      mul      ; [offset=size*i, slotbase, i]
      dup2     ; [slotbase, offset, slotbase, i]
      sload    ; [addr, offset, slotbase]
      stop
  output:
    bytecode: "6005 6064 81 6020 02 81 54 00"

# A "name=expr" assignment is an explicit redefinition, so it may rename even a
# previously confirmed item without warning.
name-assignment-redefine:
  input:
    code: |
      push 5   ; [x]
      push 0   ; [zero, x]
      pop      ; [y=x]
      stop
  output:
    bytecode: "6005 5f 50 00"

# A comparison operator (==) is not an assignment: the value remains tracked under
# its full name.
name-assignment-not-comparison:
  input:
    code: |
      caller   ; [caller]
      push 5   ; [sysaddr, caller]
      eq       ; [sysaddr == caller]
      stop
  output:
    bytecode: "33 6005 14 00"

# The copy produced by DUP (its top output) may be given its own name through
# assignment syntax, splitting it into a distinct item.
dup-copy-name-assigned:
  input:
    code: |
      push 2     ; [b]
      dup1       ; [x=b, b]
      add        ; [sum]
  output:
    bytecode: "6002 80 01"

# The assignment even works with a name that is bound to a live item.
dup-copy-name-assigned-in-use:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [c, a]
      dup1       ; [a=c, c, a]
  output:
    bytecode: "6001 6002 80"

# Without assignment syntax, naming the copy differently is an error.
dup-copy-name-in-use:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [c, a]
      dup1       ; [a, c, a]
  output:
    bytecode: "6001 6002 80"
    warnings:
      - ':3:0: stack comment item mismatch: item 0 differs (comment "a", actual "c") in [c, c, a]'

# DUP places the duplicated value on the stack as a single item occupying two
# positions. A comment that names those positions differently contradicts itself
# about one value and must be flagged, even when the recycled name ("a", already
# popped here) is no longer bound to a live stack item.
dup-named-inconsistently:
  input:
    code: |
      push 1     ; [a]
      pop        ; []
      push 2     ; [b]
      dup1       ; [a, b]
  output:
    bytecode: "6001 50 6002 80"
    warnings:
      - ':4:0: stack comment item mismatch: items 0 and 1 are the same value but named "a" and "b"'

# Here, a comment has more items than the virtual stack.
comment-overflow:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [b, a]
      add        ; [sum, x]
  output:
    bytecode: "6001 6002 01"
    warnings:
      - ":3:0: stack comment underflow: stack has 1 items, comment declares 2"

# At a control-flow merge point, names that disagree across predecessors should
# be freely renameable by the label comment without warnings.
merge-label-renames:
  input:
    code: |
      push 1         ; [a]
      push 0         ; [cond, a]
      jumpi @target  ; [a]
      push 2         ; [b, a]
      add            ; [a+b]
      target:        ; [x]
      pop            ; []
      stop
  output:
    bytecode: "6001 5f 6009 57 6002 01 5b 50 00"

# At a merge point without a label comment, instruction comments within the
# basic block should be able to rename unconfirmed items from predecessor blocks.
merge-rename-no-label-comment:
  input:
    code: |
      push 1        ; [a]
      push 0        ; [cond, a]
      jumpi @target ; [a]
      push 2        ; [b, a]
      add           ; [a+b]
      target:
      dup1          ; [x, x]
      pop           ; [x]
      stop
  output:
    bytecode: "6001 5f 6009 57 6002 01 5b 80 50 00"

# Loop: the back-edge isn't seen in the forward pass, so the loop
# label's names are unconfirmed. Here the swap after the label renames
# existing items (not new op outputs), which is allowed because the
# names are unconfirmed.
merge-loop-rename:
  input:
    code: |
      push 0       ; [count]
      push 99      ; [val, count]
      loop:
      swap1        ; [count, val]
      push 1       ; [1, count, val]
      add          ; [count+1, val]
      swap1        ; [val, count+1]
      push 10      ; [10, val, count+1]
      swap1        ; [val, 10, count+1]
      div          ; [val/10, count+1]
      dup2         ; [count+1, val/10, count+1]
      jumpi @loop  ; [val/10, count+1]
      pop          ; [count+1]
      stop
  output:
    bytecode: "5f 6063 5b 90 6001 01 90 600a 90 04 81 6003 57 50 00"

loop-overflow:
  input:
    code: |
      loop:
      push 1       ; [x]
      gas          ; [gas, x]
      push 100     ; [tv, gas, x]
      lt           ; [tv<gas, x]
      jumpi @loop  ; [x]
  output:
    bytecode: "5b 6001 5a 6064 10 6000 57"
    warnings:
      - ':1:0: loop unbalanced: entry depth 0, back-edge depth 1'

jump-with-arg:
  input:
    code: |
      push 1       ; [a]
      push 2       ; [b, a]
      jump @end
      end:         ; [b, a]
      add          ; [sum]
      stop
  output:
    bytecode: "6001 6002 6007 56 5b 01 00"

# A block reached only via a jump that leaves the stack empty must still be
# checked. The empty entry state must not be mistaken for "unreachable".
jump-target-empty-stack:
  input:
    code: |
      push 0       ; [cond]
      jumpi @t     ; []
      stop
      t:
      push 5       ; [a]
      push 6       ; [b, a]
      swap1        ; [a, wrong]
      stop
  output:
    bytecode: "5f 6005 57 00 5b 6005 6006 90 00"
    warnings:
      - ':7:0: stack comment renames item: b renamed to wrong'

# An instruction macro whose body always terminates (here it reverts) must not
# create a fall-through edge into the following label. Otherwise @ok would get a
# spurious empty-stack predecessor and report a bogus depth mismatch.
terminal-macro-no-fallthrough:
  input:
    code: |
      #define %rev() {
        push 0
        push 0
        revert
      }
      push 1       ; [cond]
      jumpi @ok    ; []
      %rev()
      ok:
      push 5       ; [a]
      push 6       ; [b, a]
      add          ; [sum]
      stop
  output:
    bytecode: "6001 6008 57 5f 5f fd 5b 6005 6006 01 00"

# A terminal opcode still has a stack effect (it consumes its inputs), so its comment
# documents the virtual post-stack and is checked like any other. Here return consumes
# [offset, size], leaving nothing, so "[]" is correct.
terminal-opcode-comment-ok:
  input:
    code: |
      push 0       ; [size]
      push 0       ; [offset, size]
      return       ; []
  output:
    bytecode: "5f 5f f3"

# A wrong comment on a terminal opcode is still flagged: return leaves an empty stack,
# so claiming one item remains is an underflow.
terminal-opcode-comment-wrong:
  input:
    code: |
      push 0       ; [size]
      push 0       ; [offset, size]
      return       ; [leftover]
  output:
    bytecode: "5f 5f f3"
    warnings:
      - ':3:0: stack comment underflow: stack has 0 items, comment declares 1'

include-effect:
  input:
    code: |
      push 1       ; [a]
      push 2       ; [b, a]
      #include "add.eas"
      pop          ; []
    files:
      add.eas: |
        add        ; [sum]
  output:
    bytecode: "6001 6002 01 50"

# Input inference continues past labels in included files: the include consumes
# two items, so the trailing pop in the main file underflows.
include-inferred-inputs-after-label:
  input:
    code: |
      push 1
      push 2
      #include "inc.eas"
      pop
      stop
    files:
      inc.eas: |
        pop
        lab:
        pop
  output:
    bytecode: "6001 6002 50 5b 50 50 00"
    warnings:
      - 'inc.eas:2:0: warning: label @lab unused in program'
      - ':4:0: stack underflow: op requires 1 items, stack has 0'

macro-with-start-comment:
  input:
    code: |
      #define %addone() { ; [x]
          push 1   ; [1, x]
          add      ; [x+1]
      }
      push 5       ; [val]
      %addone()    ; [val+1]
  output:
    bytecode: "6005 6001 01"

# A macro calling another macro that is defined later in the file must use the
# callee's real stack effect.
macro-forward-reference:
  input:
    code: |
      #define %a() {
          %b()
      }
      #define %b() {
          push 1
          push 2
      }
      %a()
      pop
      pop
  output:
    bytecode: "6001 6002 50 50"

# Mismatch inside a macro body: swap1 reorders [b, a] to [a, b],
# but the comment claims [a, a].
macro-mismatch:
  input:
    code: |
      #define %mac() {
          push 1   ; [a]
          push 2   ; [b, a]
          swap1    ; [a, a]
      }
      %mac()
  output:
    bytecode: "6001 6002 90"
    warnings:
      - ':4:4: stack comment item mismatch: item 1 differs (comment "a", actual "b") in [a, b]'

# Loop with a label comment that agrees with both the forward edge
# and the back-edge. Should produce no warnings.
loop-label-comment:
  input:
    code: |
      push 0       ; [count]
      push 99      ; [val, count]
      loop:        ; [val, count]
      swap1        ; [count, val]
      push 1       ; [1, count, val]
      add          ; [count+1, val]
      swap1        ; [val, count+1]
      push 10      ; [10, val, count+1]
      swap1        ; [val, 10, count+1]
      div          ; [val/10, count+1]
      dup2         ; [count+1, val/10, count+1]
      jumpi @loop  ; [val/10, count+1]
      pop          ; [count+1]
      stop
  output:
    bytecode: "5f 6063 5b 90 6001 01 90 600a 90 04 81 6003 57 50 00"

# Loop where the back-edge produces different names than the forward edge.
# The label comment renames to canonical names, which is allowed since
# the disagreeing positions are unconfirmed.
loop-backedge-rename:
  input:
    code: |
      push 1       ; [x]
      loop:        ; [v]
      dup1         ; [v, v]
      mul          ; [v*v]
      push 0       ; [cond, v*v]
      jumpi @loop  ; [v*v]
      pop          ; []
  output:
    bytecode: "6001 5b 80 02 5f 6002 57 50"

# Loop where the back-edge contradicts the label comment.
# The forward edge has [x] and the back-edge has [sum]. The label
# comment claims [x], but that's wrong for the back-edge path.
# Since the predecessors disagree, the position is unconfirmed,
# and the label comment can freely rename it.
loop-backedge-disagree:
  input:
    code: |
      push 1       ; [v]     <- difference to prev test is here
      loop:        ; [v]
      dup1         ; [v, v]
      mul          ; [v*v]
      push 0       ; [cond, v*v]
      jumpi @loop  ; [v*v]
      pop          ; []
  output:
    bytecode: "6001 5b 80 02 5f 6002 57 50"

# Both predecessors of the loop header agree on "x", so the name
# is confirmed. The label comment tries to rename it, which is an error.
loop-confirmed-rename:
  input:
    code: |
      push 1       ; [v]
      loop:        ; [wrong]
      dup1         ; [v, v]
      mul          ; [v]
      push 0       ; [cond, v]
      jumpi @loop  ; [v]
      pop          ; []
  output:
    bytecode: "6001 5b 80 02 5f 6002 57 50"
    warnings:
      - ':2:0: stack comment renames item: v renamed to wrong'

# Inside a loop body, the swap1 comment claims [a, a] but the stack is
# actually [a, b]. This mismatch is caught because the iterative analysis
# has the correct entry state for the loop header.
loop-body-mismatch:
  input:
    code: |
      push 1       ; [a]
      push 2       ; [b, a]
      loop:          ; [b, a]
      swap1        ; [a, a]
      swap1        ; [b, a]
      push 0       ; [cond, b, a]
      jumpi @loop  ; [b, a]
      stop
  output:
    bytecode: "6001 6002 5b 90 90 5f 6004 57 00"
    warnings:
      - ':4:0: stack comment item mismatch: item 1 differs (comment "a", actual "b") in [a, b]'

# The label comment at the loop header declares more items than
# available. Both predecessors have depth 1, so declaring 2 items
# is an underflow.
loop-label-underflow:
  input:
    code: |
      push 1       ; [x]
      loop:        ; [x, extra]
      dup1         ; [x, x]
      pop          ; [x]
      push 0       ; [cond, x]
      jumpi @loop  ; [x]
      stop
  output:
    bytecode: "6001 5b 80 50 5f 6002 57 00"
    warnings:
      - ':2:0: stack comment underflow: stack has 1 items, comment declares 2'

# Nested loops: outer loop contains an inner loop. Both loops have
# balanced stack effects and label comments. Verifies convergence.
nested-loops:
  input:
    code: |
      push 0       ; [outer]
      outer:       ; [outer]
      push 0       ; [inner, outer]
      inner:       ; [inner, outer]
      push 1       ; [1, inner, outer]
      add          ; [inner+1, outer]
      dup1         ; [inner+1, inner+1, outer]
      push 10      ; [10, inner+1, inner+1, outer]
      lt           ; [cond, inner+1, outer]
      jumpi @inner ; [inner+1, outer]

      pop          ; [outer]
      push 1       ; [1, outer]
      add          ; [outer+1]
      dup1         ; [outer+1, outer+1]
      push 3       ; [3, outer+1, outer+1]
      lt           ; [cond, outer+1]
      jumpi @outer ; [outer+1]

      stop
  output:
    bytecode: "5f 5b 5f 5b 6001 01 80 600a 10 6003 57 50 6001 01 80 6003 10 6001 57 00"

# Macro contains a jump to a label defined in the enclosing document.
# The stack checker must track the stack state through the macro's jump
# and verify it against the label comment.
macro-jump-to-outer-label:
  input:
    code: |
      #define %skipIfZero() {
          jumpi @skip  ; [a]
      }
      push 1       ; [a]
      push 0       ; [cond, a]
      %skipIfZero()
      push 2       ; [b, a]
      add          ; [sum]
      stop
      skip:        ; [a]
      stop
  output:
    bytecode: "6001 5f 600a 57 6002 01 00 5b 00"

# Global label defined in two macros with disagreeing stack comments.
# %a declares [v] (1 item) while %b declares [v, w] (2 items).
# Only %b is called, so the stack checker uses its label comment.
macro-global-label:
  input:
    code: |
      #define %a() {
          HANDLER:     ; [v]
          stop
      }
      #define %b() {
          HANDLER:     ; [v, w]
          pop          ; [w]
          stop
      }
      push 1           ; [x]
      push 2           ; [y, x]
      push 0           ; [cond, y, x]
      jumpi @HANDLER   ; [y, x]
      add              ; [sum]
      stop
      %b()
  output:
    bytecode: "6001 6002 5f 600a 57 01 00 5b 50 00"

# Simple loop without a label comment. Body comments are correct,
# so no warnings should be produced.
loop-no-label-comment:
  input:
    code: |
      push 1       ; [x]
      loop:
      dup1         ; [x, x]
      pop          ; [x]
      push 0       ; [cond, x]
      jumpi @loop  ; [x]
      stop
  output:
    bytecode: "6001 5b 80 50 5f 6002 57 00"

# Simple loop without a label comment. The swap1 comment inside the
# body claims [a, a] but the stack is [a, b].
loop-no-label-comment-mismatch:
  input:
    code: |
      push 1       ; [a]
      push 2       ; [b, a]
      loop:
      swap1        ; [a, a]
      swap1        ; [b, a]
      push 0       ; [cond, b, a]
      jumpi @loop  ; [b, a]
      stop
  output:
    bytecode: "6001 6002 5b 90 90 5f 6004 57 00"
    warnings:
      - ':4:0: stack comment item mismatch: item 1 differs (comment "a", actual "b") in [a, b]'

# Nested loops without label comments. Body comments are correct.
nested-loops-no-label-comments:
  input:
    code: |
      push 0       ; [outer]
      outer:
      push 0       ; [inner, outer]
      inner:
      push 1       ; [1, inner, outer]
      add          ; [inner+1, outer]
      dup1         ; [inner+1, inner+1, outer]
      push 10      ; [10, inner+1, inner+1, outer]
      lt           ; [cond, inner+1, outer]
      jumpi @inner ; [inner+1, outer]
      pop          ; [outer]
      push 1       ; [1, outer]
      add          ; [outer+1]
      dup1         ; [outer+1, outer+1]
      push 3       ; [3, outer+1, outer+1]
      lt           ; [cond, outer+1]
      jumpi @outer ; [outer+1]
      stop
  output:
    bytecode: "5f 5b 5f 5b 6001 01 80 600a 10 6003 57 50 6001 01 80 6003 10 6001 57 00"

# Nested loops without label comments. The add comment in the inner
# loop body tries to rename "outer" to "wrong".
nested-loops-no-label-comments-inner-mismatch:
  input:
    code: |
      push 0       ; [outer]
      outer:
      push 0       ; [inner, outer]
      inner:
      push 1       ; [1, inner, outer]
      add          ; [inner+1, wrong]
      dup1         ; [inner+1, inner+1, outer]
      push 10      ; [10, inner+1, inner+1, outer]
      lt           ; [cond, inner+1, outer]
      jumpi @inner ; [inner+1, outer]
      pop          ; [outer]
      push 1       ; [1, outer]
      add          ; [outer+1]
      dup1         ; [outer+1, outer+1]
      push 3       ; [3, outer+1, outer+1]
      lt           ; [cond, outer+1]
      jumpi @outer ; [outer+1]
      stop
  output:
    bytecode: "5f 5b 5f 5b 6001 01 80 600a 10 6003 57 50 6001 01 80 6003 10 6001 57 00"
    warnings:
      - ':6:0: stack comment renames item: outer renamed to wrong'

# Nested loops without label comments. The pop comment in the outer
# loop body tries to rename "outer" to "wrong". Since both the forward
# edge and back-edge agree on "outer", the name is confirmed.
nested-loops-no-label-comments-outer-mismatch:
  input:
    code: |
      push 0       ; [outer]
      outer:
      push 0       ; [inner, outer]
      inner:
      push 1       ; [1, inner, outer]
      add          ; [inner+1, outer]
      dup1         ; [inner+1, inner+1, outer]
      push 10      ; [10, inner+1, inner+1, outer]
      lt           ; [cond, inner+1, outer]
      jumpi @inner ; [inner+1, outer]
      pop          ; [wrong]
      push 1       ; [1, wrong]
      add          ; [wrong+1]
      dup1         ; [wrong+1, wrong+1]
      push 3       ; [3, wrong+1, wrong+1]
      lt           ; [cond, wrong+1]
      jumpi @outer ; [wrong+1]
      stop
  output:
    bytecode: "5f 5b 5f 5b 6001 01 80 600a 10 6003 57 50 6001 01 80 6003 10 6001 57 00"
    warnings:
      - ':11:0: stack comment renames item: outer renamed to wrong'

# Nested loops with label comments. The inner loop label comment
# declares more items than available on the stack (underflow).
nested-loop-inner-label-underflow:
  input:
    code: |
      push 0       ; [outer]
      outer:       ; [outer]
      push 0       ; [inner, outer]
      inner:       ; [inner, outer, extra]     <- issue is here
      push 1       ; [1, inner, outer]
      add          ; [inner+1, outer]
      dup1         ; [inner+1, inner+1, outer]
      push 10      ; [10, inner+1, inner+1, outer]
      lt           ; [cond, inner+1, outer]
      jumpi @inner ; [inner+1, outer]
      pop          ; [outer]
      push 1       ; [1, outer]
      add          ; [outer+1]
      dup1         ; [outer+1, outer+1]
      push 3       ; [3, outer+1, outer+1]
      lt           ; [cond, outer+1]
      jumpi @outer ; [outer+1]
      stop
  output:
    bytecode: "5f 5b 5f 5b 6001 01 80 600a 10 6003 57 50 6001 01 80 6003 10 6001 57 00"
    warnings:
      - ':4:0: stack comment underflow: stack has 2 items, comment declares 3'

# Nested loops with label comments. The outer label comment tries to
# rename the confirmed name "x". Both the initial push and the
# back-edge agree on "x".
nested-loop-outer-confirmed-rename:
  input:
    code: |
      push 1       ; [x]
      outer:       ; [wrong]
      dup1         ; [x, x]
      inner:       ; [x, x]
      pop          ; [x]
      dup1         ; [x, x]
      push 0       ; [cond, x, x]
      jumpi @inner ; [x, x]
      pop          ; [x]
      push 0       ; [cond, x]
      jumpi @outer ; [x]
      stop
  output:
    bytecode: "6001 5b 80 5b 50 80 5f 6004 57 50 5f 6002 57 00"
    warnings:
      - ':2:0: stack comment renames item: x renamed to wrong'

# Nested loops with label comments. The swap1 comment inside the inner
# loop body claims [outer, outer] but the stack is [outer, inner].
# The iterative analysis converges to the correct state and detects
# the mismatch.
nested-loop-inner-body-mismatch:
  input:
    code: |
      push 0       ; [outer]
      outer:       ; [outer]
      push 0       ; [inner, outer]
      inner:       ; [inner, outer]
      swap1        ; [outer, outer]
      swap1        ; [inner, outer]
      push 1       ; [1, inner, outer]
      add          ; [inner+1, outer]
      dup1         ; [inner+1, inner+1, outer]
      push 10      ; [10, inner+1, inner+1, outer]
      lt           ; [cond, inner+1, outer]
      jumpi @inner ; [inner+1, outer]
      pop          ; [outer]
      push 1       ; [1, outer]
      add          ; [outer+1]
      dup1         ; [outer+1, outer+1]
      push 3       ; [3, outer+1, outer+1]
      lt           ; [cond, outer+1]
      jumpi @outer ; [outer+1]
      stop
  output:
    bytecode: "5f 5b 5f 5b 90 90 6001 01 80 600a 10 6003 57 50 6001 01 80 6003 10 6001 57 00"
    warnings:
      - ':5:0: stack comment item mismatch: item 1 differs (comment "outer", actual "inner") in [outer, inner]'

# Four-way merge where two branches arrive with depth 1 and two with
# depth 2. The warning reports the inconsistent depths.
merge-four-way-depth-mismatch:
  input:
    code: |
      push 1            ; [a]
      push 0            ; [cond, a]
      jumpi @branch2    ; [a]
      push 0            ; [cond, a]
      jumpi @target     ; [a]
      push 2            ; [b, a]
      jump @target

      branch2:          ; [a]
      push 0            ; [cond, a]
      jumpi @target     ; [a]
      push 3            ; [c, a]

      target:           ; [x]
      stop
  output:
    bytecode: "6001 5f 600f 57 5f 6016 57 6002 6016 56 5b 5f 6016 57 6003 5b 00"
    warnings:
      - ':14:0: stack depth mismatch at merge point: predecessors have depths [1 2]'
      - ':7:0: stack comment depth mismatch: label @target expects 1 items, jump sends 2'
      - ':12:0: stack comment depth mismatch: label @target expects 1 items, jump sends 2'

# Wildcard in a label comment at a merge point suppresses the depth
# mismatch warning. Two predecessors arrive with different depths,
# but the label comment uses [x, ..] to indicate unknown depth.
wildcard-merge-suppresses-depth-warning:
  input:
    code: |
      push 1            ; [a]
      push 0            ; [cond, a]
      jumpi @target     ; [a]
      push 2            ; [b, a]
      target:           ; [x, ..]
      pop               ; [..]
      stop
  output:
    bytecode: "6001 5f 6008 57 6002 5b 50 00"

# Wildcard in a loop label comment suppresses the depth mismatch
# warning when the back-edge has a different stack depth.
wildcard-loop-suppresses-depth-warning:
  input:
    code: |
      push 1       ; [x]
      loop:        ; [..]
      dup1         ; [x, x, ..]
      push 0       ; [cond, x, x, ..]
      jumpi @loop  ; [x, x, ..]
      pop          ; [x, ..]
      stop
  output:
    bytecode: "6001 5b 80 5f 6002 57 50 00"

# Wildcard comments still verify named items. The swap1 comment
# claims [a, a, ..] but the stack is [a, b], so a mismatch at
# position 1 is reported.
wildcard-name-mismatch:
  input:
    code: |
      push 1     ; [a]
      push 2     ; [b, a]
      swap1      ; [a, a, ..]
  output:
    bytecode: "6001 6002 90"
    warnings:
      - ':3:0: stack comment item mismatch: item 1 differs (comment "a", actual "b") in [a, b, ..]'

# Loop overflow at block 0, without a label comment. The loop body
# pushes one extra item per iteration.
loop-overflow-no-label-comment:
  input:
    code: |
      loop:
      push 1
      gas
      push 100
      lt
      jumpi @loop
  output:
    bytecode: "5b 6001 5a 6064 10 6000 57"
    warnings:
      - ':1:0: loop unbalanced: entry depth 0, back-edge depth 1'

# Loop at block 0 with balanced stack effect. No warning should
# be produced since the back-edge depth matches the entry depth.
loop-balanced-at-block0:
  input:
    code: |
      push 0       ; [x]
      loop:        ; [x]
      push 1       ; [1, x]
      add          ; [x+1]
      dup1         ; [x+1, x+1]
      jumpi @loop  ; [x+1]
      stop
  output:
    bytecode: "5f 5b 6001 01 80 6001 57 00"

# Loop overflow at block 0, with wildcard label comment. The wildcard
# suppresses the unbalanced stack warning.
loop-overflow-wildcard-suppressed:
  input:
    code: |
      loop:        ; [..]
      push 1       ; [x, ..]
      dup1         ; [x, x, ..]
      jumpi @loop  ; [x, ..]
  output:
    bytecode: "5b 6001 80 6000 57"

# Push literal matches the comment number: no warning.
push-literal-match:
  input:
    code: |
      push 1       ; [1]
      push 0xff    ; [0xff, 1]
      push0        ; [0, 0xff, 1]
  output:
    bytecode: "6001 60ff 5f"

# Push literal and comment number are the same value in different
# representations (hex vs decimal): no literal mismatch warning.
push-literal-match-different-base:
  input:
    code: |
      push 0xff    ; [255]
  output:
    bytecode: "60ff"

push-literal-mismatch:
  input:
    code: |
      push 1       ; [2]
  output:
    bytecode: "6001"
    warnings:
      - ':1:0: push literal mismatch in stack comment: number 2 in comment does not match pushed value 1'

push-literal-mismatch-hex:
  input:
    code: |
      push 0xff    ; [256]
  output:
    bytecode: "60ff"
    warnings:
      - ':1:0: push literal mismatch in stack comment: number 256 in comment does not match pushed value 0xff'

push0-literal-mismatch:
  input:
    code: |
      push0        ; [1]
  output:
    bytecode: "5f"
    warnings:
      - ':1:0: push literal mismatch in stack comment: number 1 in comment does not match pushed value 0'

# A macro jumps to a label in the outer document. The stack at the jump
# matches the label comment. No warnings should be produced.
macro-external-jump:
  input:
    code: |
      #define %check() { ; [cond, err]
          jumpi @fail    ; [err]
      }
      push 1         ; [err]
      push 0         ; [cond, err]
      %check()       ; [err]
      pop            ; []
      stop
      fail:          ; [err]
      stop
  output:
    bytecode: "6001 5f 6008 57 50 00 5b 00"

# A macro jumps to a label in the outer document, but the macro has an
# extra item on the stack at the jump point. The label comment declares
# one item, but two arrive. The checker detects the depth mismatch.
# A label comment on the very first block is checked against the initial stack.
label-comment-on-first-block:
  input:
    code: |
      start:     ; [a, b, c]
      pop
      stop
  output:
    bytecode: "5b 50 00"
    warnings:
      - ':1:0: warning: label @start unused in program'
      - ':1:0: stack comment underflow: stack has 0 items, comment declares 3'
      - ':2:0: stack underflow: op requires 1 items, stack has 0'

# When predecessors tie for minimum depth at a merge point, the entry names must
# be picked deterministically (from the earliest block in source order).
merge-depth-tie-deterministic:
  input:
    code: |
      push 1     ; [x]
      push 2     ; [y, x]
      push 0
      jumpi @merge
      swap1      ; [x, y]
      merge:     ; [y, x]
      pop
      pop
      stop
  output:
    bytecode: "6001 6002 5f 6009 57 90 5b 50 50 00"

# A label targeted only by a jump inside a macro must not accumulate edges from
# intermediate propagation states when the calling block is re-walked. Only the
# real depth mismatch at @mid is reported here, not a phantom mismatch at @out.
macro-external-jump-no-stale-edges:
  input:
    code: |
      #define %m() {
          jump @out
      }
      push 0
      push 1
      push 1
      jumpi @mid
      later:
      pop
      jump @mid
      mid:
      %m()
      out:       ; [x]
      stop
  output:
    bytecode: "5f 6001 6001 600d 57 5b 50 600d 56 5b 6011 56 5b 00"
    warnings:
      - ':8:0: warning: label @later unused in program'
      - ':11:0: stack depth mismatch at merge point: predecessors have depths [1 2]'

macro-external-jump-depth-mismatch:
  input:
    code: |
      #define %check() { ; [cond, err]
          push 99        ; [junk, cond, err]
          swap1          ; [cond, junk, err]
          jumpi @fail    ; [junk, err]
          pop            ; [err]
      }
      push 1         ; [err]
      push 0         ; [cond, err]
      %check()       ; [err]
      pop            ; []
      stop
      fail:          ; [err]
      stop
  output:
    bytecode: "6001 5f 6063 90 600c 57 50 50 00 5b 00"
    warnings:
      - ':4:4: stack comment depth mismatch: label @fail expects 1 items, jump sends 2'

# Same as macro-external-jump-depth-mismatch, but the label uses a
# wildcard comment. The wildcard suppresses the depth warning.
macro-external-jump-wildcard-suppresses:
  input:
    code: |
      #define %check() { ; [cond, err]
          push 99        ; [junk, cond, err]
          swap1          ; [cond, junk, err]
          jumpi @fail    ; [junk, err]
          pop            ; [err]
      }
      push 1         ; [err]
      push 0         ; [cond, err]
      %check()       ; [err]
      pop            ; []
      stop
      fail:          ; [err, ..]
      stop
  output:
    bytecode: "6001 5f 6063 90 600c 57 50 50 00 5b 00"

# An instruction comment may elide items at the bottom of the stack: listing
# only the top item is permitted, the rest remain.
comment-elide-bottom:
  input:
    code: |
      push 1    ; [a]
      push 2    ; [b]
  output:
    bytecode: "6001 6002"

# Eliding everything (an empty comment) is permitted; the stack is left intact.
comment-elide-all:
  input:
    code: |
      push 1    ; [a]
      push 2    ; [b, a]
      pop       ; []
  output:
    bytecode: "6001 6002 50"

# Correct full-stack comment: no warning.
comment-depth-ok:
  input:
    code: |
      push 1    ; [a]
      push 2    ; [b, a]
      pop       ; [a]
  output:
    bytecode: "6001 6002 50"

# Wildcard comment opts out of depth checking.
comment-depth-wildcard-ok:
  input:
    code: |
      push 1    ; [a]
      push 2    ; [b, ..]
  output:
    bytecode: "6001 6002"

# Eliding the bottom does not discard the unlisted items: they remain tracked, so
# later comments that list them again stay consistent and produce no warnings.
comment-elide-keeps-items:
  input:
    code: |
      push 1    ; [a]
      push 2    ; [b]
      push 3    ; [c, b]
      pop       ; [b, a]
      pop       ; [a]
      stop
  output:
    bytecode: "6001 6002 6003 50 50 00"

# When a macro jumps to an external label with the wrong depth,
# the error should be reported at the macro call site, not the label.
# Error is reported on the jump inside the macro, not at the call site.
macro-external-jump-error-at-jump:
  input:
    code: |
      #define %check() { ; [cond, err]
          push 99        ; [junk, cond, err]
          swap1          ; [cond, junk, err]
          jumpi @fail    ; [junk, err]
          pop            ; [err]
      }
      push 1         ; [err]
      push 0         ; [cond, err]
      %check()       ; [err]
      pop            ; []
      stop
      fail:          ; [err]
      stop
  output:
    bytecode: "6001 5f 6063 90 600c 57 50 50 00 5b 00"
    warnings:
      - ':4:4: stack comment depth mismatch: label @fail expects 1 items, jump sends 2'

# Multiple call sites of the same macro: error reported once on the jump.
macro-external-jump-multiple-callsites:
  input:
    code: |
      #define %check() { ; [cond, err]
          push 99        ; [junk, cond, err]
          swap1          ; [cond, junk, err]
          jumpi @fail    ; [junk, err]
          pop            ; [err]
      }
      push 1         ; [err]
      push 0         ; [cond, err]
      %check()       ; [err]
      push 2         ; [err2, err]
      push 0         ; [cond, err2, err]
      %check()       ; [err2, err]
      pop            ; [err]
      pop            ; []
      stop
      fail:          ; [err]
      stop
  output:
    bytecode: "60015f6063906017575060025f606390601757505050005b00"
    warnings:
      - ':16:0: stack depth mismatch at merge point: predecessors have depths [2 3]'
      - ':4:4: stack comment depth mismatch: label @fail expects 1 items, jump sends 3'
